version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./epidemic_pipeline:/app/epidemic_pipeline
      - ./time_series_covid19_confirmed_global.csv:/app/time_series_covid19_confirmed_global.csv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - epidemic-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - epidemic-network

networks:
  epidemic-network:
    driver: bridge
